  <ellipse cx="225" cy="200" rx="5" ry="9" fill="#2C1810"/>
  
  <!-- Very sad eyebrows -->
  <path d="M 155 180 Q 175 173 195 180" stroke="#2C1810" stroke-width="4" fill="none"/>
  <path d="M 205 180 Q 225 173 245 180" stroke="#2C1810" stroke-width="4" fill="none"/>
  
  <!-- Big frown -->
