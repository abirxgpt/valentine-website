  <!-- Rain drops -->
  <line x1="170" y1="95" x2="165" y2="115" stroke="#4DA6FF" stroke-width="2"/>
  <line x1="190" y1="95" x2="185" y2="115" stroke="#4DA6FF" stroke-width="2"/>
  <line x1="210" y1="92" x2="205" y2="112" stroke="#4DA6FF" stroke-width="2"/>
  <line x1="230" y1="95" x2="225" y2="115" stroke="#4DA6FF" stroke-width="2"/>
  <line x1="250" y1="95" x2="245" y2="115" stroke="#4DA6FF" stroke-width="2"/>
  
  <text x="200" y="370" font-family="Arial" font-size="20" fill="#4682B4" text-anchor="middle">My heart can't take this 💔</text>
