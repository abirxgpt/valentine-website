<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#FFE5E9"/>
  
  <!-- Bear head -->
  <ellipse cx="200" cy="180" rx="80" ry="90" fill="#D4A574"/>
  
  <!-- Ears -->
  <circle cx="140" cy="120" r="35" fill="#D4A574"/>
  <circle cx="260" cy="120" r="35" fill="#D4A574"/>
  <circle cx="140" cy="120" r="20" fill="#FFCBA4"/>
  <circle cx="260" cy="120" r="20" fill="#FFCBA4"/>
  
  <!-- Face -->
  <ellipse cx="200" cy="200" rx="60" ry="50" fill="#FFCBA4"/>
  
  <!-- Eyes - happy -->
  <circle cx="175" cy="180" r="8" fill="#2C1810"/>
  <circle cx="225" cy="180" r="8" fill="#2C1810"/>
  
  <!-- Sparkles in eyes -->
  <circle cx="177" cy="178" r="3" fill="white"/>
  <circle cx="227" cy="178" r="3" fill="white"/>
  
  <!-- Big smile -->
  <path d="M 170 200 Q 200 220 230 200" stroke="#2C1810" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Blush -->
  <ellipse cx="155" cy="200" rx="15" ry="10" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="245" cy="200" rx="15" ry="10" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- Nose -->
  <circle cx="200" cy="195" r="8" fill="#2C1810"/>
  
  <!-- Heart above -->
  <path d="M 200 80 L 210 70 Q 220 60 220 70 Q 220 80 200 95 Q 180 80 180 70 Q 180 60 190 70 Z" fill="#FF69B4"/>
  
  <!-- Text -->
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FF1493" text-anchor="middle">Let's do this! 💕</text>
</svg>
